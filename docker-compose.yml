services:
  postgres:
    image: postgres:16
    container_name: kradra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kradra
      POSTGRES_USER: kradra
      POSTGRES_PASSWORD: kradra_local_password
    ports:
      - "5432:5432"
    volumes:
      - kradra_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kradra -d kradra"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kradra_postgres_data:

